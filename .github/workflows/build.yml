name: Kernel Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      kernel_url:
        description: 'Kernel Source URL'
        required: true
        default: 'https://github.com/MiCode/Xiaomi_Kernel_OpenSource'
      kernel_branch:
        description: 'Kernel Branch'
        required: true
        default: 'socrates-t-oss'
      susfs_url:
        description: 'SUSFS Source URL'
        required: true
        default: 'https://gitlab.com/simonpunk/susfs4ksu.git'
      susfs_branch:
        description: 'SUSFS Branch'
        required: true
        default: 'gki-android13-5.10'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Builder
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential flex bison libssl-dev libelf-dev
          sudo apt-get install -y clang llvm

      - name: Setup Directories
        run: |
          mkdir -p build_env

          KERNEL_URL="${{ github.event.inputs.kernel_url || 'https://github.com/MiCode/Xiaomi_Kernel_OpenSource' }}"
          KERNEL_BRANCH="${{ github.event.inputs.kernel_branch || 'socrates-t-oss' }}"
          SUSFS_URL="${{ github.event.inputs.susfs_url || 'https://gitlab.com/simonpunk/susfs4ksu.git' }}"
          SUSFS_BRANCH="${{ github.event.inputs.susfs_branch || 'gki-android13-5.10' }}"

          echo "Cloning Kernel (Branch: $KERNEL_BRANCH)..."
          git clone -b "$KERNEL_BRANCH" --depth=1 "$KERNEL_URL" build_env/kernel

          echo "Cloning SUSFS (Branch: $SUSFS_BRANCH)..."
          git clone -b "$SUSFS_BRANCH" --depth=1 "$SUSFS_URL" build_env/susfs

      - name: Prepare Kernel
        run: |
          bash build.sh build_env/kernel build_env/susfs

      - name: Build Kernel
        run: |
          cd build_env/kernel
          echo "Starting compilation... (Detailed make commands would go here)"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kernel-binaries
          path: build_env/kernel/out/arch/arm64/boot/Image
