# ============================================================
# Redmi K60 (socrates | SM8475) Kernel Builder
# Integrates: SukiSU-Ultra + SUSFS + Scheduler Optimizations
# Toolchain: Neutron Clang (latest) + AOSP fallback
# Output: AnyKernel3 flashable zip uploaded as GitHub Artifact
# ============================================================
name: Build Redmi K60 Kernel (SukiSU + SUSFS)

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      KERNEL_BRANCH:
        description: 'MiCode kernel branch'
        required: true
        default: 'socrates-t-oss'
      SUKISU_REF:
        description: 'SukiSU-Ultra branch/tag'
        required: true
        default: 'susfs-main'
      SUSFS_BRANCH:
        description: 'SUSFS kernel branch'
        required: true
        default: 'gki-android13-5.10'
      ENABLE_KPM:
        description: 'Enable KPM support'
        required: false
        default: 'true'

env:
  KERNEL_REPO: https://github.com/MiCode/Xiaomi_Kernel_OpenSource
  KERNEL_BRANCH: ${{ github.event.inputs.KERNEL_BRANCH || 'socrates-t-oss' }}
  SUKISU_REPO: https://github.com/SukiSU-Ultra/SukiSU-Ultra
  SUKISU_REF: ${{ github.event.inputs.SUKISU_REF || 'susfs-main' }}
  SUSFS_REPO: https://gitlab.com/simonpunk/susfs4ksu.git
  SUSFS_BRANCH: ${{ github.event.inputs.SUSFS_BRANCH || 'gki-android13-5.10' }}
  AOSP_CLANG_VER: r522817
  ARCH: arm64
  JOBS: 4
  ENABLE_KPM: ${{ github.event.inputs.ENABLE_KPM || 'true' }}

jobs:
  build:
    name: "Build socrates kernel"
    runs-on: ubuntu-22.04
    timeout-minutes: 180

    steps:
    # ------------------------------------------------------------------
    # 0. Checkout builder repo
    # ------------------------------------------------------------------
    - name: Checkout builder repo
      uses: actions/checkout@v4
      with:
        path: builder

    # ------------------------------------------------------------------
    # 1. Install dependencies
    # ------------------------------------------------------------------
    - name: Install dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y --no-install-recommends \
          git bc bison flex libssl-dev make python3 \
          zip unzip libncurses-dev device-tree-compiler ccache \
          libelf-dev dwarves zstd curl wget ca-certificates \
          lld llvm binutils-aarch64-linux-gnu patch
        echo "CCACHE_DIR=$HOME/.ccache" >> $GITHUB_ENV
        echo "USE_CCACHE=1" >> $GITHUB_ENV

    # ------------------------------------------------------------------
    # 2. Cache
    # ------------------------------------------------------------------
    - name: Cache ccache
      uses: actions/cache@v4
      with:
        path: ~/.ccache
        key: ccache-socrates-${{ github.sha }}
        restore-keys: ccache-socrates-

    - name: Cache Neutron Clang
      id: cache-clang
      uses: actions/cache@v4
      with:
        path: ~/clang
        key: neutron-clang-latest-v3

    # ------------------------------------------------------------------
    # 3. Download Neutron Clang (AOSP fallback)
    # ------------------------------------------------------------------
    - name: Download Neutron Clang
      if: steps.cache-clang.outputs.cache-hit != 'true'
      run: |
        mkdir -p ~/clang
        echo "==> Trying Neutron Clang..."
        NEUTRON_URL="https://github.com/Neutron-Toolchains/clang-build-catalogue/releases/download/latest/neutron-clang-latest.tar.zst"
        if curl -fL --retry 3 --connect-timeout 30 "$NEUTRON_URL" \
            -o /tmp/neutron-clang.tar.zst 2>/dev/null; then
          tar --use-compress-program=zstd -xf /tmp/neutron-clang.tar.zst -C ~/clang
          echo "CLANG_SOURCE=neutron" >> $GITHUB_ENV
        else
          echo "==> Neutron unavailable, falling back to AOSP Clang ..."
          AOSP_URL="https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/clang-${AOSP_CLANG_VER}.tar.gz"
          curl -fL --retry 3 "$AOSP_URL" -o /tmp/aosp-clang.tar.gz
          tar -xf /tmp/aosp-clang.tar.gz -C ~/clang
          echo "CLANG_SOURCE=aosp" >> $GITHUB_ENV
        fi
        ls ~/clang/bin/clang* | head -3

    - name: Set Clang PATH
      run: |
        echo "PATH=$HOME/clang/bin:$PATH" >> $GITHUB_ENV
        clang --version

    # ------------------------------------------------------------------
    # 4. Clone kernel source
    # ------------------------------------------------------------------
    - name: Clone kernel source (socrates-t-oss)
      run: |
        echo "==> Cloning MiCode/$KERNEL_BRANCH ..."
        git clone --depth=1 \
          --branch "$KERNEL_BRANCH" \
          "$KERNEL_REPO" \
          kernel_src
        git -C kernel_src log --oneline -3
        echo "==> arch/arm64/configs/ listing:"
        ls kernel_src/arch/arm64/configs/

    # ------------------------------------------------------------------
    # 4b. Fix broken Kconfig references in socrates-t-oss
    # ------------------------------------------------------------------
    - name: Fix missing drivers/misc/hwid/Kconfig (Xiaomi proprietary stub)
      working-directory: kernel_src
      run: |
        echo "==> Checking for hwid Kconfig references..."
        grep -rn 'hwid/Kconfig' . --include='Kconfig' 2>/dev/null || echo "  (none found)"

        # Fix 1: Comment out the broken source line in ALL Kconfig files
        find . -name 'Kconfig' -exec grep -l 'hwid/Kconfig' {} \; 2>/dev/null | \
          while IFS= read -r f; do
            sed -i 's|source "drivers/misc/hwid/Kconfig"|# source "drivers/misc/hwid/Kconfig"  # disabled: not in OSS|g' "$f"
            echo "  Patched: $f"
          done

        # Fix 2: Create stub using printf (no heredoc = no YAML issues)
        mkdir -p drivers/misc/hwid

        printf '%s\n' \
          '# Xiaomi HWID driver stub for OSS kernel builds' \
          'config HWID' \
          '    tristate "Xiaomi Hardware ID driver"' \
          '    default n' \
          '    help' \
          '      Stub for OSS builds. Set to n.' \
          > drivers/misc/hwid/Kconfig

        printf '%s\n' \
          'obj-$(CONFIG_HWID) += hwid.o' \
          > drivers/misc/hwid/Makefile

        printf '%s\n' \
          '// SPDX-License-Identifier: GPL-2.0' \
          '// Xiaomi HWID stub for OSS builds' \
          '#include <linux/module.h>' \
          'MODULE_LICENSE("GPL v2");' \
          'MODULE_DESCRIPTION("Xiaomi HWID stub");' \
          > drivers/misc/hwid/hwid.c

        echo "==> hwid stub created. Verification:"
        cat drivers/misc/hwid/Kconfig

    # ------------------------------------------------------------------
    # 5. Integrate SukiSU-Ultra
    # ------------------------------------------------------------------
    - name: Integrate SukiSU-Ultra
      working-directory: kernel_src
      run: |
        echo "==> Integrating SukiSU-Ultra (ref: $SUKISU_REF)..."
        git clone --depth=1 --branch "$SUKISU_REF" "$SUKISU_REPO" KernelSU 2>/dev/null || \
        git clone --depth=1 "$SUKISU_REPO" KernelSU
        cd KernelSU
        git checkout "$SUKISU_REF" 2>/dev/null || true
        echo "==> SukiSU: $(git log --oneline -1)"
        cd ..

        DRIVER_DIR="$(pwd)/drivers"
        ln -sf "$(realpath --relative-to="$DRIVER_DIR" "$(pwd)/KernelSU/kernel")" \
          "$DRIVER_DIR/kernelsu"

        if ! grep -q 'kernelsu' "$DRIVER_DIR/Makefile"; then
          printf '\nobj-$(CONFIG_KSU) += kernelsu/\n' >> "$DRIVER_DIR/Makefile"
        fi
        if ! grep -q 'drivers/kernelsu/Kconfig' "$DRIVER_DIR/Kconfig"; then
          sed -i '/endmenu/i source "drivers/kernelsu/Kconfig"' "$DRIVER_DIR/Kconfig"
        fi
        echo "==> SukiSU integration complete."

    # ------------------------------------------------------------------
    # 6. Clone SUSFS and apply patches
    # ------------------------------------------------------------------
    - name: Clone SUSFS and apply patches
      run: |
        echo "==> Cloning SUSFS branch: $SUSFS_BRANCH ..."
        git clone --depth=1 --branch "$SUSFS_BRANCH" "$SUSFS_REPO" susfs4ksu

        echo "==> kernel_patches/ listing:"
        ls susfs4ksu/kernel_patches/ || true

        if [ -d susfs4ksu/kernel_patches/fs ]; then
          for f in susfs4ksu/kernel_patches/fs/*.c; do
            [ -f "$f" ] && cp -v "$f" kernel_src/fs/ || true
          done
        fi
        if [ -d susfs4ksu/kernel_patches/include/linux ]; then
          mkdir -p kernel_src/include/linux
          for f in susfs4ksu/kernel_patches/include/linux/*.h; do
            [ -f "$f" ] && cp -v "$f" kernel_src/include/linux/ || true
          done
        fi

        bash builder/scripts/apply_susfs.sh kernel_src susfs4ksu

    # ------------------------------------------------------------------
    # 7. Assemble kernel .config
    # ------------------------------------------------------------------
    - name: Assemble kernel .config (cp + cat + olddefconfig)
      working-directory: kernel_src
      run: |
        export PATH="$HOME/clang/bin:$PATH"
        mkdir -p out

        echo "==> Step A: cp arch/arm64/configs/defconfig -> out/.config"
        cp arch/arm64/configs/defconfig out/.config
        echo "==> Base: $(wc -l < out/.config) lines"

        CONSOLIDATE="arch/arm64/configs/vendor/socrates_consolidate.config"
        if [ -f "$CONSOLIDATE" ]; then
          echo "==> Step B: appending $CONSOLIDATE"
          cat "$CONSOLIDATE" >> out/.config
          echo "==> After consolidate: $(wc -l < out/.config) lines"
        fi

        echo "==> Step C: appending SukiSU/SUSFS + KPM + vendor data"
        cat ../builder/configs/sukisu_susfs.config >> out/.config
        echo "# CONFIG_HWID is not set" >> out/.config
        [ "$ENABLE_KPM" = "true" ] && echo 'CONFIG_KPM=y' >> out/.config

        echo "==> Step D: scheduler optimizations"
        bash ../builder/scripts/apply_scheduler_opts.sh "$(pwd)/out/.config"

        echo "==> Step E: make olddefconfig"
        make O=out \
          ARCH=$ARCH \
          CC=clang \
          LLVM=1 \
          LLVM_IAS=1 \
          CROSS_COMPILE=aarch64-linux-gnu- \
          olddefconfig 2>&1 | tee /tmp/olddefconfig.log || {
          echo "==> WARNING: olddefconfig non-zero exit"
          [ -f out/.config ] || { echo "ERROR: no .config generated!"; exit 1; }
          echo "==> .config exists ($(wc -l < out/.config) lines), continuing."
        }

        echo
        echo "==> Final .config key values:"
        grep -E 'CONFIG_KSU=|CONFIG_SUSFS=|CONFIG_KPM=|CONFIG_KALLSYMS_ALL=|CONFIG_ANDROID_VENDOR_OEM_DATA=|CONFIG_ANDROID_VENDOR_HOOKS=|CONFIG_SCHED_WALT=|CONFIG_HZ=|CONFIG_PREEMPT=' \
          out/.config 2>/dev/null || true

    # ------------------------------------------------------------------
    # 8. Build kernel
    # ------------------------------------------------------------------
    - name: Build kernel
      working-directory: kernel_src
      run: |
        export PATH="$HOME/clang/bin:$PATH"
        export KBUILD_BUILD_USER="SukiSU-Builder"
        export KBUILD_BUILD_HOST="github-actions"

        echo "==> Starting kernel build (jobs: $JOBS)..."
        set -o pipefail
        make O=out \
          ARCH=$ARCH \
          CC="ccache clang" \
          LLVM=1 \
          LLVM_IAS=1 \
          CROSS_COMPILE=aarch64-linux-gnu- \
          -j$JOBS \
          2>&1 | tee /tmp/build.log
        BUILD_EXIT=${PIPESTATUS[0]}

        if [ $BUILD_EXIT -ne 0 ] || [ ! -f out/arch/arm64/boot/Image ]; then
          echo
          echo "==> BUILD FAILED (exit $BUILD_EXIT). Showing ALL compiler errors:"
          echo "--- grep error: ---"
          grep -n ': error:' /tmp/build.log | head -60 || true
          echo "--- grep fatal: ---"
          grep -n ': fatal error:' /tmp/build.log | head -20 || true
          echo "--- Last 40 lines of build.log ---"
          tail -40 /tmp/build.log
          exit 1
        fi

        echo "==> Build SUCCESS: $(ls -lh out/arch/arm64/boot/Image)"
        find out/arch/arm64/boot -name '*.dtb'    2>/dev/null | head -5 || true
        find out/arch/arm64/boot -name 'dtbo.img' 2>/dev/null | head -3 || true

    # ------------------------------------------------------------------
    # 9. Package with AnyKernel3
    # ------------------------------------------------------------------
    - name: Package with AnyKernel3
      run: |
        git clone --depth=1 https://github.com/osm0sis/AnyKernel3 anykernel3_pkg
        rm -f anykernel3_pkg/anykernel.sh
        rm -rf anykernel3_pkg/ramdisk anykernel3_pkg/patch anykernel3_pkg/modules
        cp builder/anykernel/anykernel.sh anykernel3_pkg/
        cp kernel_src/out/arch/arm64/boot/Image anykernel3_pkg/

        [ -f kernel_src/out/arch/arm64/boot/dtbo.img ] && \
          cp kernel_src/out/arch/arm64/boot/dtbo.img anykernel3_pkg/ && \
          echo "==> dtbo.img included."

        if find kernel_src/out/arch/arm64/boot/dts -name '*.dtb' -quit 2>/dev/null; then
          mkdir -p anykernel3_pkg/dtb
          find kernel_src/out/arch/arm64/boot/dts -name '*.dtb' \
            -exec cp {} anykernel3_pkg/dtb/ \;
          echo "==> DTBs included."
        fi

        TIMESTAMP=$(date +%Y%m%d_%H%M)
        SUKISU_VER=$(cat kernel_src/KernelSU/version 2>/dev/null | tr -d '\n' || echo 'unknown')
        ZIP_NAME="Socrates_SukiSU_${SUKISU_VER}_SUSFS_${TIMESTAMP}.zip"
        cd anykernel3_pkg
        zip -r9 "../$ZIP_NAME" . -x '*.git*' -x '*README*'
        cd ..
        echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV
        echo "==> Package: $(ls -lh $ZIP_NAME)"

    # ------------------------------------------------------------------
    # 10. Upload artifacts
    # ------------------------------------------------------------------
    - name: Upload kernel zip artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.ZIP_NAME }}
        path: ${{ env.ZIP_NAME }}
        retention-days: 30

    - name: Upload raw Image artifact
      uses: actions/upload-artifact@v4
      with:
        name: kernel-Image-socrates
        path: kernel_src/out/arch/arm64/boot/Image
        retention-days: 30

    - name: Upload build log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: /tmp/build.log
        retention-days: 7

    - name: Upload olddefconfig log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: olddefconfig-log
        path: /tmp/olddefconfig.log
        retention-days: 7

    # ------------------------------------------------------------------
    # 11. Print build summary
    # ------------------------------------------------------------------
    - name: Print build summary
      if: always()
      run: |
        echo "============================================"
        echo " Redmi K60 (socrates) Kernel Build Summary"
        echo "============================================"
        echo "  Kernel branch : $KERNEL_BRANCH"
        echo "  SukiSU ref    : $SUKISU_REF"
        echo "  SUSFS branch  : $SUSFS_BRANCH"
        echo "  KPM enabled   : $ENABLE_KPM"
        echo "  Clang source  : ${CLANG_SOURCE:-unknown}"
        echo "  Output zip    : ${ZIP_NAME:-N/A}"
        echo "============================================"
        if [ -f kernel_src/out/arch/arm64/boot/Image ]; then
          echo "  Image size    : $(du -sh kernel_src/out/arch/arm64/boot/Image | cut -f1)"
          echo "  BUILD STATUS  : SUCCESS V"
        else
          echo "  BUILD STATUS  : FAILED X"
        fi
        echo "============================================"
