# ============================================================
# Redmi K60 (socrates | SM8475) Kernel Builder
# Integrates: SukiSU-Ultra + SUSFS + Scheduler Optimizations
# Toolchain: Neutron Clang (latest) + binutils
# Output: AnyKernel3 flashable zip uploaded as GitHub Artifact
# ============================================================
name: Build Redmi K60 Kernel (SukiSU + SUSFS)

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      KERNEL_BRANCH:
        description: 'MiCode kernel branch'
        required: true
        default: 'socrates-t-oss'
      SUKISU_REF:
        description: 'SukiSU-Ultra branch/tag (e.g. susfs-main or a tag)'
        required: true
        default: 'susfs-main'
      SUSFS_BRANCH:
        description: 'SUSFS kernel branch (gki-android13-5.10 for socrates/Android13)'
        required: true
        default: 'gki-android13-5.10'
      ENABLE_KPM:
        description: 'Enable KPM (Kernel Patch Module) support'
        required: false
        default: 'true'

env:
  # ---- Kernel source ---------------------------------------------------
  KERNEL_REPO: https://github.com/MiCode/Xiaomi_Kernel_OpenSource
  KERNEL_BRANCH: ${{ github.event.inputs.KERNEL_BRANCH || 'socrates-t-oss' }}
  KERNEL_DEFCONFIG: vendor/socrates_defconfig

  # ---- SukiSU ----------------------------------------------------------
  SUKISU_REPO: https://github.com/SukiSU-Ultra/SukiSU-Ultra
  SUKISU_REF: ${{ github.event.inputs.SUKISU_REF || 'susfs-main' }}

  # ---- SUSFS -----------------------------------------------------------
  # Correct branch names in simonpunk/susfs4ksu:
  #   Android 13 + 5.10 kernel  -> gki-android13-5.10   (socrates)
  #   Android 12 + 5.10 kernel  -> gki-android12-5.10
  #   Android 13 + 5.15 kernel  -> gki-android13-5.15
  SUSFS_REPO: https://gitlab.com/simonpunk/susfs4ksu.git
  SUSFS_BRANCH: ${{ github.event.inputs.SUSFS_BRANCH || 'gki-android13-5.10' }}

  # ---- Toolchain -------------------------------------------------------
  AOSP_CLANG_VER: r522817

  # ---- Build options ---------------------------------------------------
  ARCH: arm64
  JOBS: 4
  ENABLE_KPM: ${{ github.event.inputs.ENABLE_KPM || 'true' }}

jobs:
  build:
    name: "Build socrates kernel"
    runs-on: ubuntu-22.04
    timeout-minutes: 180

    steps:
    # ------------------------------------------------------------------
    # 0. Checkout this builder repo (scripts, configs, anykernel)
    # ------------------------------------------------------------------
    - name: Checkout builder repo
      uses: actions/checkout@v4
      with:
        path: builder

    # ------------------------------------------------------------------
    # 1. Install build dependencies
    # ------------------------------------------------------------------
    - name: Install dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y --no-install-recommends \
          git bc bison flex libssl-dev make python3 python3-pip \
          zip unzip libncurses-dev device-tree-compiler ccache \
          libelf-dev dwarves zstd curl wget ca-certificates \
          lld llvm binutils-aarch64-linux-gnu patch
        echo "CCACHE_DIR=$HOME/.ccache" >> $GITHUB_ENV
        echo "USE_CCACHE=1" >> $GITHUB_ENV

    # ------------------------------------------------------------------
    # 2. Cache: ccache + toolchain
    # ------------------------------------------------------------------
    - name: Cache ccache
      uses: actions/cache@v4
      with:
        path: ~/.ccache
        key: ccache-socrates-${{ github.run_id }}
        restore-keys: ccache-socrates-

    - name: Cache Neutron Clang
      id: cache-clang
      uses: actions/cache@v4
      with:
        path: ~/clang
        key: neutron-clang-latest-v2

    # ------------------------------------------------------------------
    # 3. Download Neutron Clang (with AOSP fallback)
    # ------------------------------------------------------------------
    - name: Download Neutron Clang
      if: steps.cache-clang.outputs.cache-hit != 'true'
      run: |
        mkdir -p ~/clang
        echo "==> Trying Neutron Clang..."
        NEUTRON_URL="https://github.com/Neutron-Toolchains/clang-build-catalogue/releases/download/latest/neutron-clang-latest.tar.zst"
        if curl -fL --retry 3 --connect-timeout 30 "$NEUTRON_URL" \
            -o /tmp/neutron-clang.tar.zst 2>/dev/null; then
          echo "==> Extracting Neutron Clang..."
          tar --use-compress-program=zstd -xf /tmp/neutron-clang.tar.zst -C ~/clang
          echo "CLANG_SOURCE=neutron" >> $GITHUB_ENV
        else
          echo "==> Neutron unavailable, falling back to AOSP Clang ${AOSP_CLANG_VER}..."
          AOSP_URL="https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/clang-${AOSP_CLANG_VER}.tar.gz"
          curl -fL --retry 3 "$AOSP_URL" -o /tmp/aosp-clang.tar.gz
          tar -xf /tmp/aosp-clang.tar.gz -C ~/clang
          echo "CLANG_SOURCE=aosp" >> $GITHUB_ENV
        fi
        echo "==> Clang binary found:"
        ls ~/clang/bin/clang* | head -3

    - name: Set Clang PATH
      run: |
        echo "PATH=$HOME/clang/bin:$PATH" >> $GITHUB_ENV
        clang --version

    # ------------------------------------------------------------------
    # 4. Clone kernel source (shallow, single branch)
    # ------------------------------------------------------------------
    - name: Clone kernel source (socrates-t-oss)
      run: |
        echo "==> Cloning MiCode/$KERNEL_BRANCH ..."
        git clone --depth=1 \
          --branch "$KERNEL_BRANCH" \
          "$KERNEL_REPO" \
          kernel_src
        echo "==> Kernel HEAD:"
        git -C kernel_src log --oneline -3

    # ------------------------------------------------------------------
    # 5. Integrate SukiSU-Ultra
    # ------------------------------------------------------------------
    - name: Integrate SukiSU-Ultra
      working-directory: kernel_src
      run: |
        echo "==> Integrating SukiSU-Ultra (ref: $SUKISU_REF)..."

        # Clone SukiSU — try requested branch/tag, fall back to default branch
        git clone --depth=1 \
          --branch "$SUKISU_REF" \
          "$SUKISU_REPO" \
          KernelSU 2>/dev/null || \
        git clone --depth=1 "$SUKISU_REPO" KernelSU

        cd KernelSU
        git checkout "$SUKISU_REF" 2>/dev/null || true
        echo "==> SukiSU HEAD: $(git log --oneline -1)"
        echo "==> SukiSU version: $(cat version 2>/dev/null || echo 'unknown')"
        cd ..

        # Locate drivers/ directory (non-GKI layout)
        DRIVER_DIR="$(pwd)/drivers"
        if [ ! -d "$DRIVER_DIR" ]; then
          echo "ERROR: drivers/ not found in kernel root!"
          ls -la; exit 1
        fi

        # Symlink KernelSU/kernel -> drivers/kernelsu
        ln -sf "$(realpath --relative-to="$DRIVER_DIR" "$(pwd)/KernelSU/kernel")" \
          "$DRIVER_DIR/kernelsu"
        echo "==> Symlink: $DRIVER_DIR/kernelsu -> KernelSU/kernel"

        # Patch drivers/Makefile
        if ! grep -q 'kernelsu' "$DRIVER_DIR/Makefile"; then
          printf '\nobj-$(CONFIG_KSU) += kernelsu/\n' >> "$DRIVER_DIR/Makefile"
          echo "==> Patched drivers/Makefile"
        fi

        # Patch drivers/Kconfig
        if ! grep -q 'drivers/kernelsu/Kconfig' "$DRIVER_DIR/Kconfig"; then
          sed -i '/endmenu/i source "drivers/kernelsu/Kconfig"' "$DRIVER_DIR/Kconfig"
          echo "==> Patched drivers/Kconfig"
        fi

        echo "==> SukiSU-Ultra integration complete."

    # ------------------------------------------------------------------
    # 6. Clone SUSFS and apply patches
    #    Branch naming in simonpunk/susfs4ksu:
    #      gki-android13-5.10  <- socrates (Android 13, kernel 5.10)
    #      gki-android12-5.10
    #      gki-android13-5.15
    #      gki-android14-5.15  etc.
    # ------------------------------------------------------------------
    - name: Clone SUSFS and apply patches
      run: |
        echo "==> Cloning SUSFS branch: $SUSFS_BRANCH ..."
        git clone --depth=1 \
          --branch "$SUSFS_BRANCH" \
          "$SUSFS_REPO" \
          susfs4ksu

        echo "==> SUSFS branch content (kernel_patches/):"
        ls susfs4ksu/kernel_patches/ || true

        echo "==> Copying SUSFS VFS source files into kernel..."
        # Copy every .c file from fs/
        if [ -d susfs4ksu/kernel_patches/fs ]; then
          for f in susfs4ksu/kernel_patches/fs/*.c; do
            [ -f "$f" ] && cp -v "$f" kernel_src/fs/ || true
          done
        fi

        # Copy header files
        if [ -d susfs4ksu/kernel_patches/include/linux ]; then
          mkdir -p kernel_src/include/linux
          for f in susfs4ksu/kernel_patches/include/linux/*.h; do
            [ -f "$f" ] && cp -v "$f" kernel_src/include/linux/ || true
          done
        fi

        echo "==> Running SUSFS patch applier script..."
        bash builder/scripts/apply_susfs.sh kernel_src susfs4ksu

    # ------------------------------------------------------------------
    # 7. Apply scheduler optimizations (defconfig overlay)
    # ------------------------------------------------------------------
    - name: Apply scheduler and performance optimizations
      run: |
        bash builder/scripts/apply_scheduler_opts.sh kernel_src "$ENABLE_KPM"

    # ------------------------------------------------------------------
    # 8. Merge KConfig fragment (SukiSU + SUSFS) into defconfig
    # ------------------------------------------------------------------
    - name: Merge KConfig fragment into defconfig
      working-directory: kernel_src
      run: |
        # Try multiple known defconfig paths for socrates
        DEFCONFIG_PATH=""
        for candidate in \
          "arch/arm64/configs/vendor/socrates_defconfig" \
          "arch/arm64/configs/socrates_defconfig" \
          "arch/arm64/configs/vendor/lahaina_defconfig"; do
          if [ -f "$candidate" ]; then
            DEFCONFIG_PATH="$candidate"
            break
          fi
        done

        if [ -z "$DEFCONFIG_PATH" ]; then
          echo "==> WARNING: socrates_defconfig not found, searching..."
          DEFCONFIG_PATH=$(find arch/arm64/configs -name '*socrat*' 2>/dev/null | head -1)
          if [ -z "$DEFCONFIG_PATH" ]; then
            echo "==> Available defconfigs:"
            find arch/arm64/configs -name '*.config' -o -name '*defconfig' | head -20
            echo "ERROR: Cannot find defconfig for socrates!"
            exit 1
          fi
        fi

        echo "==> Using defconfig: $DEFCONFIG_PATH"
        echo "DEFCONFIG_PATH=$DEFCONFIG_PATH" >> $GITHUB_ENV

        # Append KConfig fragment
        cat ../builder/configs/sukisu_susfs.config >> "$DEFCONFIG_PATH"
        echo "==> KConfig fragment appended."

        # Conditionally enable KPM
        if [ "$ENABLE_KPM" = "true" ]; then
          echo 'CONFIG_KPM=y' >> "$DEFCONFIG_PATH"
          echo "==> KPM enabled."
        fi

    # ------------------------------------------------------------------
    # 9. Configure kernel (make defconfig + olddefconfig)
    # ------------------------------------------------------------------
    - name: Configure kernel (make defconfig + olddefconfig)
      working-directory: kernel_src
      run: |
        export PATH="$HOME/clang/bin:$PATH"
        BASENAME=$(basename "$DEFCONFIG_PATH")

        make O=out \
          ARCH=$ARCH \
          CC=clang \
          LLVM=1 \
          LLVM_IAS=1 \
          CROSS_COMPILE=aarch64-linux-gnu- \
          "$BASENAME"

        make O=out \
          ARCH=$ARCH \
          CC=clang \
          LLVM=1 \
          LLVM_IAS=1 \
          CROSS_COMPILE=aarch64-linux-gnu- \
          olddefconfig

        echo "==> Final KSU/SUSFS/Scheduler config values:"
        grep -E 'CONFIG_KSU|CONFIG_SUSFS|CONFIG_KPM|CONFIG_KALLSYMS|CONFIG_SCHED_WALT|CONFIG_HZ=|CONFIG_PREEMPT=|CONFIG_TCP_CONG_BBR|CONFIG_MQ_IOSCHED_KYBER' \
          out/.config || true

    # ------------------------------------------------------------------
    # 10. Build kernel
    # ------------------------------------------------------------------
    - name: Build kernel
      working-directory: kernel_src
      run: |
        export PATH="$HOME/clang/bin:$PATH"
        export KBUILD_BUILD_USER="SukiSU-Builder"
        export KBUILD_BUILD_HOST="github-actions"

        echo "==> Starting kernel build (jobs: $JOBS)..."
        make O=out \
          ARCH=$ARCH \
          CC="ccache clang" \
          LLVM=1 \
          LLVM_IAS=1 \
          CROSS_COMPILE=aarch64-linux-gnu- \
          -j$JOBS \
          2>&1 | tee /tmp/build.log

        # Verify output Image exists
        if [ ! -f out/arch/arm64/boot/Image ]; then
          echo "==> ERROR: Image not found! Last 60 lines of build log:"
          tail -60 /tmp/build.log
          exit 1
        fi
        echo "==> Build SUCCESS: $(ls -lh out/arch/arm64/boot/Image)"

        # Check for DTB/DTBO
        find out/arch/arm64/boot -name '*.dtb' 2>/dev/null | head -5 || true
        find out/arch/arm64/boot -name 'dtbo.img' 2>/dev/null | head -3 || true

    # ------------------------------------------------------------------
    # 11. Package with AnyKernel3
    # ------------------------------------------------------------------
    - name: Package with AnyKernel3
      run: |
        echo "==> Cloning AnyKernel3..."
        git clone --depth=1 \
          https://github.com/osm0sis/AnyKernel3 \
          anykernel3_pkg

        # Remove example files
        rm -f anykernel3_pkg/anykernel.sh
        rm -rf anykernel3_pkg/ramdisk anykernel3_pkg/patch anykernel3_pkg/modules

        # Install our anykernel.sh
        cp builder/anykernel/anykernel.sh anykernel3_pkg/

        # Copy kernel Image
        cp kernel_src/out/arch/arm64/boot/Image anykernel3_pkg/

        # Copy dtbo.img if present
        if [ -f kernel_src/out/arch/arm64/boot/dtbo.img ]; then
          cp kernel_src/out/arch/arm64/boot/dtbo.img anykernel3_pkg/
          echo "==> dtbo.img included."
        fi

        # Collect DTBs
        if find kernel_src/out/arch/arm64/boot/dts -name '*.dtb' -quit 2>/dev/null; then
          mkdir -p anykernel3_pkg/dtb
          find kernel_src/out/arch/arm64/boot/dts -name '*.dtb' \
            -exec cp {} anykernel3_pkg/dtb/ \;
          echo "==> DTBs included."
        fi

        # Create zip
        TIMESTAMP=$(date +%Y%m%d_%H%M)
        SUKISU_VER=$(cat kernel_src/KernelSU/version 2>/dev/null | tr -d '\n' || echo 'unknown')
        ZIP_NAME="Socrates_SukiSU_${SUKISU_VER}_SUSFS_${TIMESTAMP}.zip"
        cd anykernel3_pkg
        zip -r9 "../$ZIP_NAME" . -x '*.git*' -x '*README*'
        cd ..
        echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV
        echo "==> Package: $(ls -lh $ZIP_NAME)"

    # ------------------------------------------------------------------
    # 12. Upload artifacts
    # ------------------------------------------------------------------
    - name: Upload kernel zip artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.ZIP_NAME }}
        path: ${{ env.ZIP_NAME }}
        retention-days: 30

    - name: Upload raw Image artifact
      uses: actions/upload-artifact@v4
      with:
        name: kernel-Image-socrates
        path: kernel_src/out/arch/arm64/boot/Image
        retention-days: 30

    - name: Upload build log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: /tmp/build.log
        retention-days: 7

    # ------------------------------------------------------------------
    # 13. Print build summary
    # ------------------------------------------------------------------
    - name: Print build summary
      if: always()
      run: |
        echo "============================================"
        echo " Redmi K60 (socrates) Kernel Build Summary"
        echo "============================================"
        echo "  Kernel branch : $KERNEL_BRANCH"
        echo "  SukiSU ref    : $SUKISU_REF"
        echo "  SUSFS branch  : $SUSFS_BRANCH"
        echo "  KPM enabled   : $ENABLE_KPM"
        echo "  Clang source  : ${CLANG_SOURCE:-unknown}"
        echo "  Output zip    : ${ZIP_NAME:-N/A}"
        echo "============================================"
        if [ -f kernel_src/out/arch/arm64/boot/Image ]; then
          echo "  Image size    : $(du -sh kernel_src/out/arch/arm64/boot/Image | cut -f1)"
          echo "  BUILD STATUS  : SUCCESS ✓"
        else
          echo "  BUILD STATUS  : FAILED ✗"
        fi
        echo "============================================"
