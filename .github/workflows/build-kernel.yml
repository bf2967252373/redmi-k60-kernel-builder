# ============================================================
# Redmi K60 (socrates | SM8475) Kernel Builder
# Integrates: SukiSU-Ultra + SUSFS + Scheduler Optimizations
# Toolchain: Neutron Clang (latest) + AOSP fallback
# Output: AnyKernel3 flashable zip uploaded as GitHub Artifact
# ============================================================
name: Build Redmi K60 Kernel (SukiSU + SUSFS)

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      KERNEL_BRANCH:
        description: 'MiCode kernel branch'
        required: true
        default: 'socrates-t-oss'
      SUKISU_REF:
        description: 'SukiSU-Ultra branch/tag'
        required: true
        default: 'susfs-main'
      SUSFS_BRANCH:
        description: 'SUSFS kernel branch (use gki-android13-5.15 for kernel 5.15)'
        required: true
        default: 'gki-android13-5.15'
      ENABLE_KPM:
        description: 'Enable KPM support'
        required: false
        default: 'true'

env:
  KERNEL_REPO: https://github.com/MiCode/Xiaomi_Kernel_OpenSource
  KERNEL_BRANCH: ${{ github.event.inputs.KERNEL_BRANCH || 'socrates-t-oss' }}
  SUKISU_REPO: https://github.com/SukiSU-Ultra/SukiSU-Ultra
  SUKISU_REF: ${{ github.event.inputs.SUKISU_REF || 'susfs-main' }}
  SUSFS_REPO: https://gitlab.com/simonpunk/susfs4ksu.git
  # socrates-t-oss is kernel 5.15 — use the matching SUSFS branch
  SUSFS_BRANCH: ${{ github.event.inputs.SUSFS_BRANCH || 'gki-android13-5.15' }}
  AOSP_CLANG_VER: r522817
  ARCH: arm64
  JOBS: 4
  ENABLE_KPM: ${{ github.event.inputs.ENABLE_KPM || 'true' }}
  # Force-define CONFIG_ANDROID_VENDOR_OEM_DATA via preprocessor flag.
  # The macro has no Kconfig entry in socrates-t-oss, so olddefconfig would
  # silently drop it if we tried CONFIG_ANDROID_VENDOR_OEM_DATA=y in .config.
  # Using KCPPFLAGS injects it at the C preprocessor level unconditionally.
  VENDOR_CPPFLAG: "-DCONFIG_ANDROID_VENDOR_OEM_DATA"

jobs:
  build:
    name: "Build socrates kernel"
    runs-on: ubuntu-22.04
    timeout-minutes: 180

    steps:
    # ------------------------------------------------------------------
    # 0. Checkout builder repo
    # ------------------------------------------------------------------
    - name: Checkout builder repo
      uses: actions/checkout@v4
      with:
        path: builder

    # ------------------------------------------------------------------
    # 1. Install dependencies
    # ------------------------------------------------------------------
    - name: Install dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y --no-install-recommends \
          git bc bison flex libssl-dev make python3 \
          zip unzip libncurses-dev device-tree-compiler ccache \
          libelf-dev dwarves zstd curl wget ca-certificates \
          lld llvm clang binutils-aarch64-linux-gnu patch
        echo "CCACHE_DIR=$HOME/.ccache" >> $GITHUB_ENV
        echo "USE_CCACHE=1" >> $GITHUB_ENV

    # ------------------------------------------------------------------
    # 2. Cache
    # ------------------------------------------------------------------
    - name: Cache ccache
      uses: actions/cache@v4
      with:
        path: ~/.ccache
        key: ccache-socrates-${{ github.sha }}
        restore-keys: ccache-socrates-

    - name: Cache Neutron Clang
      id: cache-clang
      uses: actions/cache@v4
      with:
        path: ~/clang
        key: neutron-clang-latest-v3

    # ------------------------------------------------------------------
    # 3. Download Neutron Clang (AOSP fallback)
    # ------------------------------------------------------------------
    - name: Download Neutron Clang
      if: steps.cache-clang.outputs.cache-hit != 'true'
      run: |
        mkdir -p ~/clang
        DOWNLOAD_OK=false

        # --- Attempt 1: Neutron Clang (optimized for Snapdragon 8+) ---
        echo "==> [1/3] Trying Neutron Clang..."
        NEUTRON_URL="https://github.com/Neutron-Toolchains/clang-build-catalogue/releases/download/latest/neutron-clang-latest.tar.zst"
        if curl -fL --retry 3 --connect-timeout 30 "$NEUTRON_URL" \
            -o /tmp/neutron-clang.tar.zst 2>/dev/null; then
          if tar --use-compress-program=zstd -xf /tmp/neutron-clang.tar.zst -C ~/clang 2>/dev/null; then
            echo "CLANG_SOURCE=neutron" >> $GITHUB_ENV
            DOWNLOAD_OK=true
            echo "==> Neutron Clang installed successfully."
          fi
        fi

        # --- Attempt 2: AOSP Clang prebuilt (tag-based download) ---
        if [ "$DOWNLOAD_OK" != "true" ]; then
          echo "==> [2/3] Neutron unavailable, trying AOSP Clang r${AOSP_CLANG_VER}..."
          # Use the AOSP CI artifact mirror — more reliable than googlesource archive
          AOSP_URL="https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/clang-${AOSP_CLANG_VER}.tar.gz"
          if curl -fL --retry 3 --connect-timeout 30 "$AOSP_URL" \
              -o /tmp/aosp-clang.tar.gz 2>/dev/null; then
            if tar -xf /tmp/aosp-clang.tar.gz -C ~/clang 2>/dev/null && \
               ls ~/clang/bin/clang 2>/dev/null; then
              echo "CLANG_SOURCE=aosp" >> $GITHUB_ENV
              DOWNLOAD_OK=true
              echo "==> AOSP Clang r${AOSP_CLANG_VER} installed successfully."
            fi
          fi
        fi

        # --- Attempt 3: AOSP Clang alternative mirror ---
        if [ "$DOWNLOAD_OK" != "true" ]; then
          echo "==> [3/3] Trying AOSP Clang from alternative mirror..."
          # Prebuilt Clang from Android NDK infrastructure
          ALT_AOSP_URL="https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/clang-${AOSP_CLANG_VER}.tar.gz"
          # Try the latest tagged release instead of main branch
          LATEST_TAG=$(curl -sL "https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+refs/tags?format=TEXT" 2>/dev/null | \
            grep 'clang-r' | tail -1 | base64 -d 2>/dev/null | grep -oP 'clang-r\d+' | head -1 || echo "")
          if [ -n "$LATEST_TAG" ]; then
            echo "==> Found latest AOSP tag: $LATEST_TAG"
            TAG_URL="https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/tags/${LATEST_TAG}.tar.gz"
            if curl -fL --retry 3 --connect-timeout 30 "$TAG_URL" \
                -o /tmp/aosp-clang2.tar.gz 2>/dev/null; then
              if tar -xf /tmp/aosp-clang2.tar.gz -C ~/clang 2>/dev/null && \
                 ls ~/clang/bin/clang 2>/dev/null; then
                echo "CLANG_SOURCE=aosp-tag" >> $GITHUB_ENV
                DOWNLOAD_OK=true
                echo "==> AOSP Clang ($LATEST_TAG) installed successfully."
              fi
            fi
          fi
        fi

        # --- Final fallback: apt-installed clang ---
        if [ "$DOWNLOAD_OK" != "true" ]; then
          echo "==> [FALLBACK] All downloads failed — using system clang from apt."
          echo "CLANG_SOURCE=system" >> $GITHUB_ENV
          # System clang is already available via apt (installed in step 1)
          # We just need to ensure it's symlinked into ~/clang/bin for unified PATH
          mkdir -p ~/clang/bin
          for tool in clang clang++ clang-18 clang++-18 ld.lld llvm-ar llvm-nm llvm-objcopy llvm-objdump llvm-strip; do
            src=$(which "$tool" 2>/dev/null || true)
            [ -n "$src" ] && ln -sf "$src" ~/clang/bin/ 2>/dev/null || true
          done
          echo "==> System clang fallback ready."
        fi

        echo "==> CLANG_SOURCE: ${CLANG_SOURCE:-unknown}"
        ls -la ~/clang/bin/clang* 2>/dev/null || echo "WARNING: No clang binary found in ~/clang/bin!"

    - name: Set Clang PATH
      run: |
        echo "PATH=$HOME/clang/bin:$PATH" >> $GITHUB_ENV
        clang --version

    # ------------------------------------------------------------------
    # 4. Clone kernel source
    # ------------------------------------------------------------------
    - name: Clone kernel source (socrates-t-oss)
      run: |
        echo "==> Cloning MiCode/$KERNEL_BRANCH ..."
        git clone --depth=1 \
          --branch "$KERNEL_BRANCH" \
          "$KERNEL_REPO" \
          kernel_src
        git -C kernel_src log --oneline -3
        echo "==> arch/arm64/configs/ listing:"
        ls kernel_src/arch/arm64/configs/

    # ------------------------------------------------------------------
    # 4b. Fix missing drivers/misc/hwid/Kconfig
    # ------------------------------------------------------------------
    - name: Fix missing drivers/misc/hwid/Kconfig
      working-directory: kernel_src
      run: |
        find . -name 'Kconfig' -exec grep -l 'hwid/Kconfig' {} \; 2>/dev/null | \
          while IFS= read -r f; do
            sed -i 's|source "drivers/misc/hwid/Kconfig"|# source "drivers/misc/hwid/Kconfig"|g' "$f"
            echo "  Patched Kconfig ref: $f"
          done
        mkdir -p drivers/misc/hwid
        printf '%s\n' 'config HWID' '    tristate "Xiaomi HWID stub"' '    default n' \
          > drivers/misc/hwid/Kconfig
        printf '%s\n' 'obj-$(CONFIG_HWID) += hwid.o' > drivers/misc/hwid/Makefile
        printf '%s\n' '// SPDX-License-Identifier: GPL-2.0' '#include <linux/module.h>' \
          'MODULE_LICENSE("GPL v2");' > drivers/misc/hwid/hwid.c
        echo "==> hwid stub created."

    # ------------------------------------------------------------------
    # 4c. Patch android_vendor.h to enable vendor data fields unconditionally
    # ------------------------------------------------------------------
    - name: Patch android_vendor.h (enable vendor data unconditionally)
      working-directory: kernel_src
      run: |
        python3 ../builder/scripts/patch_android_vendor.py
        echo "==> android_vendor.h patch done."
        echo "==> Relevant lines:"
        grep -n 'android_vendor_data\|ANDROID_VENDOR_DATA\|ifdef CONFIG_ANDROID' \
          include/linux/android_vendor.h | head -20 || true

    # ------------------------------------------------------------------
    # 5. Integrate SukiSU-Ultra
    # ------------------------------------------------------------------
    - name: Integrate SukiSU-Ultra
      working-directory: kernel_src
      run: |
        echo "==> Integrating SukiSU-Ultra (ref: $SUKISU_REF)..."
        git clone --depth=1 --branch "$SUKISU_REF" "$SUKISU_REPO" KernelSU 2>/dev/null || \
        git clone --depth=1 "$SUKISU_REPO" KernelSU
        cd KernelSU && git checkout "$SUKISU_REF" 2>/dev/null || true
        echo "==> SukiSU: $(git log --oneline -1)"
        cd ..
        DRIVER_DIR="$(pwd)/drivers"
        ln -sf "$(realpath --relative-to="$DRIVER_DIR" "$(pwd)/KernelSU/kernel")" \
          "$DRIVER_DIR/kernelsu"
        grep -q 'kernelsu' "$DRIVER_DIR/Makefile" || \
          printf '\nobj-$(CONFIG_KSU) += kernelsu/\n' >> "$DRIVER_DIR/Makefile"
        grep -q 'drivers/kernelsu/Kconfig' "$DRIVER_DIR/Kconfig" || \
          sed -i '/endmenu/i source "drivers/kernelsu/Kconfig"' "$DRIVER_DIR/Kconfig"
        echo "==> SukiSU integration complete."

    # ------------------------------------------------------------------
    # 6. Clone SUSFS and apply patches
    #    apply_susfs.sh is now self-contained: it copies .c files AND
    #    applies patches internally. The explicit copy below is kept as
    #    a belt-and-suspenders pre-stage for any workflow ordering edge
    #    cases, but apply_susfs.sh will skip already-present files.
    # ------------------------------------------------------------------
    - name: Clone SUSFS and apply patches
      run: |
        git clone --depth=1 --branch "$SUSFS_BRANCH" "$SUSFS_REPO" susfs4ksu
        echo "==> SUSFS kernel_patches listing:"
        ls susfs4ksu/kernel_patches/ || true
        # Pre-copy .c and .h files (apply_susfs.sh will skip if already done)
        if [ -d susfs4ksu/kernel_patches/fs ]; then
          for f in susfs4ksu/kernel_patches/fs/*.c; do
            [ -f "$f" ] && cp -v "$f" kernel_src/fs/ || true
          done
        fi
        if [ -d susfs4ksu/kernel_patches/include/linux ]; then
          mkdir -p kernel_src/include/linux
          for f in susfs4ksu/kernel_patches/include/linux/*.h; do
            [ -f "$f" ] && cp -v "$f" kernel_src/include/linux/ || true
          done
        fi
        bash builder/scripts/apply_susfs.sh kernel_src susfs4ksu

    # ------------------------------------------------------------------
    # 7. Assemble kernel .config
    # ------------------------------------------------------------------
    - name: Assemble kernel .config
      working-directory: kernel_src
      run: |
        export PATH="$HOME/clang/bin:$PATH"
        mkdir -p out
        cp arch/arm64/configs/defconfig out/.config
        CONSOLIDATE="arch/arm64/configs/vendor/socrates_consolidate.config"
        [ -f "$CONSOLIDATE" ] && cat "$CONSOLIDATE" >> out/.config
        cat ../builder/configs/sukisu_susfs.config >> out/.config
        echo "# CONFIG_HWID is not set" >> out/.config
        [ "$ENABLE_KPM" = "true" ] && echo 'CONFIG_KPM=y' >> out/.config
        bash ../builder/scripts/apply_scheduler_opts.sh "$(pwd)/out/.config"

        make O=out \
          ARCH=$ARCH \
          CC=clang \
          LLVM=1 LLVM_IAS=1 \
          CROSS_COMPILE=aarch64-linux-gnu- \
          KCPPFLAGS="$VENDOR_CPPFLAG" \
          olddefconfig 2>&1 | tee /tmp/olddefconfig.log || {
          [ -f out/.config ] || { echo "ERROR: no .config!"; exit 1; }
          echo "==> olddefconfig warning ignored (config exists)."
        }

        echo "==> Key config values:"
        grep -E 'CONFIG_KSU=|CONFIG_SUSFS=|CONFIG_KPM=|CONFIG_KALLSYMS_ALL=|CONFIG_SCHED_WALT=' \
          out/.config || true

    # ------------------------------------------------------------------
    # 8. Build kernel
    # ------------------------------------------------------------------
    - name: Build kernel
      working-directory: kernel_src
      run: |
        export PATH="$HOME/clang/bin:$PATH"
        export KBUILD_BUILD_USER="SukiSU-Builder"
        export KBUILD_BUILD_HOST="github-actions"
        set -o pipefail
        make O=out \
          ARCH=$ARCH \
          CC="ccache clang" \
          LLVM=1 LLVM_IAS=1 \
          CROSS_COMPILE=aarch64-linux-gnu- \
          KCPPFLAGS="$VENDOR_CPPFLAG" \
          -j$JOBS \
          2>&1 | tee /tmp/build.log
        BUILD_EXIT=${PIPESTATUS[0]}

        if [ $BUILD_EXIT -ne 0 ] || [ ! -f out/arch/arm64/boot/Image ]; then
          echo "==> BUILD FAILED. Compiler errors:"
          grep -n ': error:' /tmp/build.log | head -60 || true
          grep -n ': fatal error:' /tmp/build.log | head -20 || true
          echo "--- Last 50 lines ---"
          tail -50 /tmp/build.log
          exit 1
        fi
        echo "==> SUCCESS: $(ls -lh out/arch/arm64/boot/Image)"

    # ------------------------------------------------------------------
    # 9. Package with AnyKernel3
    # ------------------------------------------------------------------
    - name: Package with AnyKernel3
      run: |
        git clone --depth=1 https://github.com/osm0sis/AnyKernel3 anykernel3_pkg
        rm -f anykernel3_pkg/anykernel.sh
        rm -rf anykernel3_pkg/ramdisk anykernel3_pkg/patch anykernel3_pkg/modules
        cp builder/anykernel/anykernel.sh anykernel3_pkg/
        cp kernel_src/out/arch/arm64/boot/Image anykernel3_pkg/
        [ -f kernel_src/out/arch/arm64/boot/dtbo.img ] && \
          cp kernel_src/out/arch/arm64/boot/dtbo.img anykernel3_pkg/
        if find kernel_src/out/arch/arm64/boot/dts -name '*.dtb' -quit 2>/dev/null; then
          mkdir -p anykernel3_pkg/dtb
          find kernel_src/out/arch/arm64/boot/dts -name '*.dtb' \
            -exec cp {} anykernel3_pkg/dtb/ \;
        fi
        TIMESTAMP=$(date +%Y%m%d_%H%M)
        SUKISU_VER=$(cat kernel_src/KernelSU/version 2>/dev/null | tr -d '\n' || echo 'unknown')
        ZIP_NAME="Socrates_SukiSU-${SUKISU_VER}_SUSFS_${TIMESTAMP}.zip"
        cd anykernel3_pkg && zip -r9 "../$ZIP_NAME" . -x '*.git*' -x '*README*'
        cd ..
        echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV
        echo "==> Package: $(ls -lh $ZIP_NAME)"

    # ------------------------------------------------------------------
    # 10. Upload artifacts
    # ------------------------------------------------------------------
    - name: Upload kernel zip
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.ZIP_NAME }}
        path: ${{ env.ZIP_NAME }}
        retention-days: 30

    - name: Upload kernel Image
      uses: actions/upload-artifact@v4
      with:
        name: kernel-Image-socrates
        path: kernel_src/out/arch/arm64/boot/Image
        retention-days: 30

    - name: Upload build log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: /tmp/build.log
        retention-days: 7

    - name: Upload olddefconfig log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: olddefconfig-log
        path: /tmp/olddefconfig.log
        retention-days: 7

    # ------------------------------------------------------------------
    # 11. Summary
    # ------------------------------------------------------------------
    - name: Build summary
      if: always()
      run: |
        echo "===================================="
        echo " Redmi K60 (socrates) Build Summary"
        echo "===================================="
        echo "  Branch  : $KERNEL_BRANCH"
        echo "  SukiSU  : $SUKISU_REF"
        echo "  SUSFS   : $SUSFS_BRANCH"
        echo "  KPM     : $ENABLE_KPM"
        echo "  Clang   : ${CLANG_SOURCE:-unknown}"
        echo "  Zip     : ${ZIP_NAME:-none}"
        if [ -f kernel_src/out/arch/arm64/boot/Image ]; then
          echo "  Size    : $(du -sh kernel_src/out/arch/arm64/boot/Image | cut -f1)"
          echo "  STATUS  : SUCCESS"
        else
          echo "  STATUS  : FAILED"
        fi
        echo "===================================="
